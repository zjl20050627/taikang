llm:
  # 可选: deepseek / zhipuai / mock
  provider: "deepseek"

  deepseek:
    model: "deepseek-chat"
    base_url: "https://api.deepseek.com"
    temperature: 0.3
    max_tokens: 4096

  zhipuai:
    api_key: "ZHIPUAI_API_KEY"
    model: "glm-4-flash"
    temperature: 0.3
    max_tokens: 4096

neo4j:
  uri: "neo4j+s://48d09440.databases.neo4j.io"
  user: "48d09440"              # Aura 控制台中的 NEO4J_USERNAME
  database: "48d09440"          # Aura 控制台中的 NEO4J_DATABASE
  # password 请写在 .env 的 NEO4J_PASSWORD 中，勿提交到 Git

system:
  max_hops: 3
  max_triples: 500
  enable_source: true