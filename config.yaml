llm:
  # 选择使用哪个 LLM 后端，目前支持 "zhipuai" 和 "openai_compatible"
  provider: "zhipuai"

  zhipuai:
    api_key: "ZHIPUAI_API_KEY"   # 后续替换为.env文件读取
    model: "glm-4.7"              # 额度够
    temperature: 0.3
    max_tokens: 4096             # 为思考模型留足空间

neo4j:
  uri: "bolt://localhost:7687"               # 本地Neo4j实例
  user: "neo4j"
  password: "12345678"     # 用户提供的密码

system:
  max_hops: 3
  max_triples: 500
  enable_source: true